    public static int[] reverseArray(int[] arr) {
        int left = 0, right = arr.length - 1;
        while (left < right) {
            int temp = arr[left];
            arr[left] = arr[right];
            arr[right] = temp;
            left++;
            right--;
        }
        return arr;
    }

    public static void main(String[] args) {
        int[] arr = {1, 2, 3, 4, 5};
        int[] result = reverseArray(arr);
        for (int num : result) {
            System.out.print(num + " ");
        }
    }

public class Solution {
    public static int[] twoSum(int[] nums, int target) {
        HashMap<Integer, Integer> map = new HashMap<>();
        for (int i = 0; i < nums.length; i++) {
            int complement = target - nums[i];
            if (map.containsKey(complement)) {
                return new int[]{map.get(complement), i};
            }
            map.put(nums[i], i);
        }
        return new int[]{-1, -1};
    }

    public static void main(String[] args) {

        int[] result = twoSum(nums, 9);

        }

                if ((c == ')' && top != '(') ||

                    (c == ']' && top != '[')) {

                }
            }
        }
        return stack.isEmpty();

            if (minStack.isEmpty() || val <= minStack.peek()) {

    public static void bubbleSort(int[] arr) {
        int n = arr.length;
        for (int i = 0; i < n - 1; i++) {
            boolean swapped = false;
            for (int j = 0; j < n - i - 1; j++) {
                if (arr[j] > arr[j + 1]) {
                    int temp = arr[j];
                    arr[j] = arr[j + 1];
                    arr[j + 1] = temp;
                    swapped = true;
                }
            }
            if (!swapped) break;
        }
    }

    public static void main(String[] args) {
        int[] arr = {64, 34, 25, 12, 22, 11, 90};
        bubbleSort(arr);
        for (int num : arr) {
            System.out.print(num + " ");
        }

    public static int binarySearch(int[] arr, int target) {
        int left = 0, right = arr.length - 1;
        while (left <= right) {
            int mid = left + (right - left) / 2;
            if (arr[mid] == target) return mid;
            else if (arr[mid] < target) left = mid + 1;
            else right = mid - 1;
        }
        return -1;
    }

    public static void selectionSort(int[] arr) {
        int n = arr.length;
        for (int i = 0; i < n - 1; i++) {
            int minIdx = i;
            for (int j = i + 1; j < n; j++) {
                if (arr[j] < arr[minIdx]) {
                    minIdx = j;
                }
            }
            int temp = arr[minIdx];
            arr[minIdx] = arr[i];
            arr[i] = temp;
        }
    }

    public static void main(String[] args) {
        int[] arr = {29, 10, 14, 37, 13};
        selectionSort(arr);
        for (int num : arr) {
            System.out.print(num + " ");
        }
    }

    public static void mergeSort(int[] arr, int left, int right) {
        if (left < right) {
            int mid = (left + right) / 2;
            mergeSort(arr, left, mid);
            mergeSort(arr, mid + 1, right);
            merge(arr, left, mid, right);
        }
    }

    public static void merge(int[] arr, int left, int mid, int right) {
        int n1 = mid - left + 1;
        int n2 = right - mid;
        int[] L = new int[n1];
        int[] R = new int[n2];
        for (int i = 0; i < n1; i++) L[i] = arr[left + i];
        for (int j = 0; j < n2; j++) R[j] = arr[mid + 1 + j];
        int i = 0, j = 0, k = left;
        while (i < n1 && j < n2) {
            if (L[i] <= R[j]) arr[k++] = L[i++];
            else arr[k++] = R[j++];
        }
        while (i < n1) arr[k++] = L[i++];
        while (j < n2) arr[k++] = R[j++];
    }

    public static void main(String[] args) {
        int[] arr = {38, 27, 43, 3, 9, 82, 10};
        mergeSort(arr, 0, arr.length - 1);
        for (int num : arr) {
            System.out.print(num + " ");
        }
    }
}`,expectedOutput:"3 9 10 27 38 43 82",hints:["Divide the array into two halves recursively","Merge two sorted halves into one sorted array"],explanation:"Merge sort divides the array into halves, recursively sorts each half, then merges them. The merge step combines two sorted arrays into one. Time: O(n log n), Space: O(n).",tags:["sorting","divide-and-conquer","recursion"]},{id:21,title:"Factorial using Recursion",category:"Recursion",difficulty:"Easy",description:"Write a recursive method to calculate the factorial of a number.",starterCode:`public class Solution {

    interface Sortable {
        void sort();
    }

    static class NumberList implements Sortable {
        int[] numbers;

        NumberList(int[] numbers) {
            this.numbers = numbers;
        }

        @Override
        public void sort() {
            for (int i = 0; i < numbers.length - 1; i++) {
                for (int j = 0; j < numbers.length - i - 1; j++) {
                    if (numbers[j] > numbers[j + 1]) {
                        int temp = numbers[j];
                        numbers[j] = numbers[j + 1];
                        numbers[j + 1] = temp;
                    }
                }
            }
        }

        void display() {
            for (int num : numbers) {
                System.out.print(num + " ");
            }
            System.out.println();
        }
    }

    public static void main(String[] args) {
        NumberList list = new NumberList(new int[]{5, 2, 8, 1, 9, 3});
        System.out.print("Before: ");
        list.display();
        list.sort();
        System.out.print("After: ");
        list.display();
    }
}`,expectedOutput:`Before: 5 2 8 1 9 3

            String key = new String(chars);
            map.computeIfAbsent(key, k -> new ArrayList<>()).add(s);

        return new ArrayList<>(map.values());

public class Solution {
    public static int coinChange(int[] coins, int amount) {
        int[] dp = new int[amount + 1];
        Arrays.fill(dp, amount + 1);
        dp[0] = 0;
        for (int i = 1; i <= amount; i++) {
            for (int coin : coins) {
                if (coin <= i) {
                    dp[i] = Math.min(dp[i], dp[i - coin] + 1);
                }
            }
        }
        return dp[amount] > amount ? -1 : dp[amount];
    }

    public static void main(String[] args) {
        int[] coins = {1, 5, 10, 25};
        System.out.println(coinChange(coins, 30));
        System.out.println(coinChange(coins, 11));
    }

    public static int lcs(String s1, String s2) {
        int m = s1.length(), n = s2.length();
        int[][] dp = new int[m + 1][n + 1];
        for (int i = 1; i <= m; i++) {
            for (int j = 1; j <= n; j++) {
                if (s1.charAt(i - 1) == s2.charAt(j - 1)) {
                    dp[i][j] = dp[i - 1][j - 1] + 1;
                } else {
                    dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                }
            }
        }
        return dp[m][n];
    }

        System.out.println(lcs("AGGTAB", "GXTXAYB"));

    public static String compress(String s) {
        StringBuilder sb = new StringBuilder();
        int count = 1;
        for (int i = 1; i <= s.length(); i++) {
            if (i < s.length() && s.charAt(i) == s.charAt(i - 1)) {
                count++;
            } else {
                sb.append(s.charAt(i - 1)).append(count);
                count = 1;
            }
        }
        String compressed = sb.toString();
        return compressed.length() < s.length() ? compressed : s;
    }

        System.out.println(compress("aabcccccaaa"));
        System.out.println(compress("abcd"));
    }

        int start, end;

        NumberRange(int start, int end) {
            this.start = start;
            this.end = end;
        }

        @Override
        public Iterator<Integer> iterator() {
            return new Iterator<Integer>() {
                int current = start;

                @Override
                public boolean hasNext() {
                    return current <= end;
                }

                @Override
                public Integer next() {
                    return current++;
                }
            };
        }
    }

    public static void quickSort(int[] arr, int low, int high) {
        if (low < high) {
            int pi = partition(arr, low, high);
            quickSort(arr, low, pi - 1);
            quickSort(arr, pi + 1, high);
        }
    }

    public static int partition(int[] arr, int low, int high) {
        int pivot = arr[high];
        int i = low - 1;
        for (int j = low; j < high; j++) {
            if (arr[j] < pivot) {
                i++;
                int temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
        }
        int temp = arr[i + 1];
        arr[i + 1] = arr[high];
        arr[high] = temp;
        return i + 1;
    }

    public static void main(String[] args) {
        int[] arr = {10, 7, 8, 9, 1, 5};
        quickSort(arr, 0, arr.length - 1);
        for (int num : arr) {
            System.out.print(num + " ");
        }
    }
}`,expectedOutput:"1 5 7 8 9 10",hints:["Partition places pivot at correct position with smaller elements left and larger right","Use the last element as pivot"],explanation:"Quick sort picks a pivot, partitions the array around it, and recursively sorts the partitions. Partition places all elements smaller than pivot to the left. Average time: O(n log n), worst: O(n²).",tags:["sorting","divide-and-conquer","recursion"]},{id:52,title:"Implement Comparable Interface",category:"OOP Concepts",difficulty:"Medium",description:"Create a Product class that implements Comparable to sort products by price.",starterCode:`import java.util.Arrays;

    public static String reverseString(String s) {
        char[] chars = s.toCharArray();
        int left = 0, right = chars.length - 1;
        while (left < right) {
            char temp = chars[left];
            chars[left] = chars[right];
            chars[right] = temp;
            left++;
            right--;
        }
        return new String(chars);
    }

    public static void main(String[] args) {
        System.out.println(reverseString("Euromonitor"));
        System.out.println(reverseString("Hello World"));
    }

    public static void printPyramid(int n) {
        for (int i = 1; i <= n; i++) {
            for (int j = n - i; j > 0; j--) {
                System.out.print(" ");
            }
            for (int j = 1; j <= i; j++) {
                System.out.print(j + " ");
            }
            System.out.println();
        }
    }

    public static void main(String[] args) {
        printPyramid(5);
    }

import java.util.List;

public class Solution {
    interface Observer {
        void update(String news);
    }

    static class NewsAgency {
        List<Observer> observers = new ArrayList<>();

        public void addObserver(Observer o) {
            observers.add(o);
        }

        public void removeObserver(Observer o) {
            observers.remove(o);
        }

        public void notifyObservers(String news) {
            for (Observer o : observers) {
                o.update(news);
            }
        }

        public void publishNews(String news) {
            System.out.println("Publishing: " + news);
            notifyObservers(news);
        }
    }

    static class Subscriber implements Observer {
        String name;
        Subscriber(String name) { this.name = name; }

        @Override
        public void update(String news) {
            System.out.println(name + " received: " + news);
        }
    }

    public static void main(String[] args) {
        NewsAgency agency = new NewsAgency();
        Subscriber s1 = new Subscriber("Alice");
        Subscriber s2 = new Subscriber("Bob");
        agency.addObserver(s1);
        agency.addObserver(s2);
        agency.publishNews("Breaking: Java 21 Released!");
    }
}`,expectedOutput:`Publishing: Breaking: Java 21 Released!
